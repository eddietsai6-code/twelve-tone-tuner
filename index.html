<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eddie Tuner</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="tuner-shell" id="tunerApp">
      <section
        class="meter-panel"
        aria-labelledby="appTitle"
        aria-describedby="statusText"
      >
        <header class="top-bar">
          <div>
            <p class="kicker">12-TET</p>
            <h1 id="appTitle">Eddie Tuner</h1>
          </div>
          <div class="status-lamp" aria-hidden="true"></div>
        </header>

        <div
          class="vu-meter"
          role="meter"
          aria-label="Cents offset"
          aria-valuemin="-50"
          aria-valuemax="50"
          aria-valuenow="0"
        >
          <div class="meter-face">
            <div class="scale" aria-hidden="true"></div>
            <div class="center-band" aria-hidden="true"></div>
            <div class="meter-frequency" aria-hidden="true">
              <span id="meterFrequency">--</span>
              <small>Hz</small>
            </div>
            <div class="meter-cents" aria-hidden="true">
              <span id="meterCentsValue">0</span>
              <small>Cents</small>
            </div>
            <div class="needle" id="needle" aria-hidden="true"></div>
            <div class="pivot" aria-hidden="true"></div>
          </div>
        </div>

        <section class="readout-grid" aria-live="polite">
          <div class="primary-note">
            <div class="note-line">
              <span id="noteName">--</span>
              <small id="noteOctave"></small>
            </div>
            <span class="target-inline" id="targetValue">--</span>
          </div>
        </section>

        <div class="mode-strip" role="group" aria-label="Tuning mode">
          <button class="mode-button active" type="button" data-mode="chromatic">
            <span class="mode-name">12-TET</span>
            <small class="mode-reference">Any 12-TET note</small>
          </button>
          <button class="mode-button" type="button" data-mode="guitar">
            <span class="mode-name">Guitar</span>
            <small class="mode-reference"></small>
          </button>
          <button class="mode-button" type="button" data-mode="ukulele">
            <span class="mode-name">Ukulele</span>
            <small class="mode-reference"></small>
          </button>
          <button class="mode-button" type="button" data-mode="violin">
            <span class="mode-name">Violin</span>
            <small class="mode-reference"></small>
          </button>
        </div>

        <footer class="control-strip">
          <button class="start-button" id="startButton" type="button">
            Start
          </button>
          <label class="a4-control">
            <span>A4</span>
            <input
              id="a4Input"
              type="number"
              inputmode="decimal"
              min="400"
              max="480"
              step="0.1"
              value="440"
            />
            <span>Hz</span>
          </label>
          <div class="level-meter" aria-hidden="true">
            <span id="levelFill"></span>
          </div>
        </footer>

        <p class="status-text" id="statusText">READY</p>
      </section>
    </main>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
